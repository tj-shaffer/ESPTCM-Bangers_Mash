# TestForge — Forge manifest (Custom UI)
#
# IMPORTANT: This is a Custom UI app — NOT UI Kit. Custom UI modules reference
# a static `resource` (the built frontend) + a `resolver` function. Never add
# `render: native` (that is UI Kit and is mutually exclusive with Custom UI;
# see DECISIONS.md ADR-001).
#
# Forge-native demo build. Call path: frontend (built React app in /build) →
# `@forge/bridge invoke()` → resolver function → swappable TestCaseStore
# (in-memory seed today; Forge SQL next). No Azure hop, so no external.fetch
# allowlist is needed for the demo. (Production target reinstates Azure — see
# DECISIONS.md / memory note "forge-native-pivot".)

app:
  id: ari:cloud:ecosystem::app/d26d4c9f-9d76-4ade-8976-8064391aff24
  runtime:
    name: nodejs22.x

modules:
  # NOTE: jira:issuePanel removed for the demo — it requires an `icon` and is
  # cramped in a narrow panel. Re-add with a bundled icon when the compact
  # coverage panel view is built. The project/global pages are the demo surfaces.
  jira:projectPage:
    - key: testforge-project-page
      resource: main
      resolver:
        function: resolver
      title: TestForge
      layout: basic

  jira:globalPage:
    - key: testforge-global-page
      resource: main
      resolver:
        function: resolver
      title: TestForge Dashboard

  webtrigger:
    - key: testforge-webhook-receiver
      function: webhook-handler

  function:
    - key: resolver
      handler: index.handler
    - key: webhook-handler
      handler: webhookHandler.handler

resources:
  - key: main
    # Custom UI: point at the BUILT static frontend (Vite output), not src.
    # Source lives at static/frontend/src; `vite build` emits to
    # static/frontend/build, which is what Forge ships.
    path: static/frontend/build
    tunnel:
      port: 3000

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - read:jira-user
    - read:me
